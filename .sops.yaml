keys:
  - &admin_gorschu age1aph83gkdg83l6cf83nsdthp95dcd5natpa7527sd3p8rtlcj3dgstl502c
  - &hosts_hephaestus age1tx6wn5dtsqguqslm4cevw2crf6fgg89r6t9glxlz6hkmh4y7rqrq7p373h
  - &users_hephaestus_gorschu age1mzqfpr6lkpjw5evkwl7fuc8wzphxe6cxg63s9kmhs99df37u2pnsawt787
creation_rules:
  - path_regex: secrets/hosts/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *admin_gorschu
          - *hosts_hephaestus
  - path_regex: secrets/hosts/hephaestus/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *admin_gorschu
          - *hosts_hephaestus
  - path_regex: secrets/hosts/[^/]+/ssh/ssh_host_.*_key$
    key_groups:
      - age:
          - *admin_gorschu
  # age key files: host SSH key bootstraps the user age key onto the machine
  - path_regex: secrets/users/[^/]+/age/.*
    key_groups:
      - age:
          - *admin_gorschu
          - *hosts_hephaestus
  # user secrets: admin can edit, deployed user key can decrypt at runtime
  - path_regex: secrets/users/.*
    key_groups:
      - age:
          - *admin_gorschu
          - *users_hephaestus_gorschu
